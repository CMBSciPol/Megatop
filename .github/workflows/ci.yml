name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Set up prek and run hooks
        uses: j178/prek-action@v2
        with:
          prek-version: "0.4.5"

  test:
    name: Run tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install namaster dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev libfftw3-dev libcfitsio-dev

      - name: Sync project
        run: uv sync --locked --managed-python

      - name: Run tests
        run: uv run pytest -vv

  e2e:
    name: End-to-end pipeline check (${{ matrix.mpi && 'MPI' || 'no MPI' }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mpi: [true, false]
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev libfftw3-dev libcfitsio-dev ${{ matrix.mpi && 'libopenmpi-dev openmpi-bin' || '' }}

      - name: Sync project
        run: uv sync --locked --managed-python ${{ matrix.mpi && '--extra mpi' || '' }}

      - name: Cache pysm3 template data
        uses: actions/cache@v5
        with:
          path: ~/.astropy/cache
          key: pysm3-${{ runner.os }}-${{ hashFiles('paramfiles/e2e_check.yaml') }}
          restore-keys: pysm3-${{ runner.os }}-

      # Serially populate the pysm3 template cache before the pipeline runs, so
      # concurrent rules don't race on astropy's download lock. Retry with a hard
      # timeout — the CDS template server occasionally stalls (no client timeout).
      - name: Pre-fetch pysm3 templates
        timeout-minutes: 6
        run: |
          for i in 1 2 3; do
            timeout -k 10 90 uv run python -c "import pysm3; pysm3.Sky(nside=64, preset_strings=['d0', 's0'])" && exit 0
            echo "pysm fetch failed/stalled (attempt $i), retrying..."
            sleep 10
          done
          exit 1

      - name: Run e2e pipeline
        env:
          # Use the small committed ns0064 hitmap fixture (no NERSC download).
          SO_NOMINAL_HITMAP_PATH: ${{ github.workspace }}/tests/data/norm_nHits_SA_35FOV_ns0064.fits
        run: uv run bash runfiles/run_e2e_check.sh paramfiles/e2e_check.yaml ${{ matrix.mpi && '--np 2' || '' }}

  e2e-snakemake:
    name: End-to-end pipeline check (Snakemake)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev libfftw3-dev libcfitsio-dev

      - name: Sync project
        run: uv sync --locked --extra snake --managed-python

      - name: Cache pysm3 template data
        uses: actions/cache@v5
        with:
          path: ~/.astropy/cache
          key: pysm3-${{ runner.os }}-${{ hashFiles('paramfiles/e2e_check.yaml') }}
          restore-keys: pysm3-${{ runner.os }}-

      # Serially populate the pysm3 template cache before the pipeline runs, so
      # the parallel mock_signal rules don't race on astropy's download lock.
      # Retry with a hard timeout — the CDS template server occasionally stalls.
      - name: Pre-fetch pysm3 templates
        timeout-minutes: 6
        run: |
          for i in 1 2 3; do
            timeout -k 10 90 uv run python -c "import pysm3; pysm3.Sky(nside=64, preset_strings=['d0', 's0'])" && exit 0
            echo "pysm fetch failed/stalled (attempt $i), retrying..."
            sleep 10
          done
          exit 1

      - name: Run e2e pipeline via Snakemake
        env:
          # Use the small committed ns0064 hitmap fixture (no NERSC download).
          SO_NOMINAL_HITMAP_PATH: ${{ github.workspace }}/tests/data/norm_nHits_SA_35FOV_ns0064.fits
        run: uv run snakemake --cores 4 --configfile paramfiles/e2e_check.yaml

      - name: Run plot rules
        run: MPLBACKEND=Agg uv run snakemake plots --cores 4 --configfile paramfiles/e2e_check.yaml
