name: Build on Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write

    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for dynamic versioning

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Debug Git tags and versioning
        run: |
          echo "Git tags:"
          git tag -l
          echo "Current tag:"
          git describe --tags --exact-match HEAD || echo "No exact tag match"
          echo "Version info:"
          git describe --tags --always

      - name: Clean uv cache for dynamic versioning
        run: uv cache clean

      - name: Build package
        run: uv build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          echo "Built artifacts:"
          find dist/ -name "*.whl" -o -name "*.tar.gz" | head -10

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
