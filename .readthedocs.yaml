version: 2

build:
  os: ubuntu-24.04
  tools:
    python: latest
    uv: latest
  jobs:
    install:
      - uv sync --only-group docs --no-install-project
    build:
      html:
        - zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
