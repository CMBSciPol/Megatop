masks_pars:
  nhits_map_name: nhits_map
  analysis_mask_name: common_analysis_mask
  binary_mask_name: common_binary_mask
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: C1
  binary_mask_zero_threshold: 0.1
  fwhm_arcmin_smooth_nhits: 60.0
  include_galactic: false
  galactic_mask_name: galactic_mask
  gal_key: GAL060
  include_sources: false
  sources_mask_name: sources_mask
  mock_nsources: 100
  mock_sources_hole_radius: 4.0
general_pars:
  nside: 256
  lmin: 30
  lmax: 500
pre_proc_pars:
  common_beam_correction: 0.0
  DEBUGskippreproc: false
  correct_for_TF: false
  sum_TF_column: false
parametric_sep_pars:
  use_harmonic_compsep: false
  harmonic_lmax: 256
  harmonic_lmin: 30
  harmonic_delta_ell: 10
  alm2map: false
  include_synchrotron: true
  minimize_method: TNC
  minimize_tol: 1.0e-25
  minimize_options:
    disp: false
    gtol: 1.0e-16
    eps: 1.0e-12
    maxiter: 100
    ftol: 1.0e-16
  passband_int: false
  use_megabuster: true
  megabuster_options:
    max_steps_CG: 25
    tol_CG: 1.0e-08
    use_preconditioner_diag: false
    use_preconditioner_pinv: false
    solver_name: scipy_tnc
    minimizer_options:
      cooldown: 5
      min_steps: 5
    use_calibration_matrix: false
    use_hessienne: false
    use_hmc: false
    n_warm: 50
    n_samples: 50
    use_obsmat: false
    use_beam_operator: false
    max_iter: 300
map2cl_pars:
  delta_ell: 10
  purify_e: false
  purify_b: true
  n_iter_namaster: 3
  DEBUG_cut_scales: false
plot_pars:
  lmin_plot: 30
  lmax_plot: 700
map_sim_pars:
  n_sim: 1
  sky_model:
  - d0
  - s0
  cmb_sim_no_pysm: true
  r_input: 0.0
  A_lens: 1.0
  Birefringence: 0.0
  cmb_seed: 1
  single_cmb: false
  filter_sims: false
  filter_noise: false
  DEBUGDont_Filter_purenoise_sims: false
  generate_sims_for_TF: false
  TF_power_law_amp: 1.0
  TF_power_law_index: 2.0
  TF_power_law_delta_ell: 1
  TF_n_sim: 2
  passband_int: false
  DEBUG_noEmodes: false
noise_sim_pars:
  n_sim: 100
  include_nhits: true
  seed: 42
  DEBUG_save_TRUEnoise_simulations: false
  experiments:
    SO-SAT:
      usev3p1: true
      default_bands:
      - 27.0
      - 39.0
      - 93.0
      - 145.0
      - 225.0
      - 280.0
      noise_option: white_noise
      v3_sensitivity_mode: GOAL
      v3_one_over_f_mode: OPTIMISTIC
      Ntubes_years:
      - 1.0
      - 9.0
      - 5.0
      SAC_yrs_LF: 1.0
cl2r_pars:
  dust_marg: false
  sync_marg: false
  prior_bounds:
    A_{dust}:
    - 0.0
    - 1.0
    A_{lens}:
    - 0.0
    - 2.0
    A_{sync}:
    - 0.0
    - 1.0
    r:
    - -0.02
    - 1.0
    Birefringence:
    - -1.0
    - 1.0
  load_model_spectra: true
  n_walkers: 300
  n_steps: 5000
  n_steps_burnin: 2000
noise_cov_pars:
  save_preprocessed_noise_maps: true
