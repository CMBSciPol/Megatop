# Here is a sample .yaml file that can be used
# to store the metadata necessary to run the
# SO BB pipeline.

# Define the directories
## Let's start with directories of data products
data_dirs:
  root: "/global/cfs/cdirs/sobs/sims/mss-0002/RC1.r01"
  map_directory: ''  # Empty string: assume the nhits map are stored in root
  nhits_directory: '' # Empty string:  assume the nhits map are stored in root
  noise_maps_directory: '/pscratch/sd/j/jost/SO_MEGATOP/MSS2/NoiseMaps'
  cmb_maps_directory: ''
  # beam_directory: "beams"
  # bandpasses_directory: "bandpasses"
  # mock_directory: "mock_data"
## Then directories in which we will store outputs
output_dirs:
  root: "/pscratch/sd/j/jost/SO_MEGATOP/MSS2/End2End_useNoiseMap"
  mask_directory: "masks"
  pre_process_directory: "pre_processing"
  covmat_directory: "covariances"  
  plots_directory: "plots"
  components_directory: "components"
  spectra_directory: "spectra"  


fiducial_cmb: 
  cls_cmb_directory: "/global/homes/j/jost/Megatop/fiducial_cmb_spectra"
  lensed: "Cls_Planck2018_lensed_scalar.fits"
  unlensed_scalar_tensor_r1: "Cls_Planck2018_unlensed_scalar_and_tensor_r1.fits"

