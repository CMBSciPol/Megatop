# Metadata related to the analysis #
####################################
## General parameters
general_pars:
  # frequencies: [27, 39, 93, 145, 225, 280] # [93, 145, 225, 280]
  # frequencies: [30, 40, 90, 150, 230, 290] # [93, 145, 225, 280]
  nside: 128 #256
  lmin: 30 #30
  lmax: 256 #200
  # nlb: 10
  # custom_bins: True
  # noise_option: 'white_noise'
  # include_stat_res: False
  # no_inh: False
  # Nspec: 0
  # sensitivity_mode: 2
  # SAC_yrs_LF: 1
  # knee_mode: 1
  # ny_lf: 1.0
  # bmodes_template: ''
  # instrument: 'SO'
  # bandpass: False
  # Nsims_bias:  500
  # # common_beam_correction: 100.0
  # effective_beam_correction: True
  # Nico_noise_combination: True
  # # Where the beam window is lower than beam_floor, set it to beam_floor
  # beam_floor: 1.e-2



pre_proc_pars:
    common_beam_correction: 100.0 # In arcmin. If 0 the common beam step will be skipped
    fwhm: [91., 63., 30., 17., 11.,  9.] # In arcmin for each frequency. TODO: replace with path to import from file?

noise_cov_pars:
    noise_cov_method: 'sim_in_noisecov' # tag for the simulations, can be ['sims_in_noisecov', 'load_sims'], sims_in_noisecov: will simulate the (white) noise maps with nhits during the noise cov step,
                               #  load_sims: will load the noise maps from disk generated during the simulations step. 
    noise_lvl_uKarcmin:  # Computed in MSS2TestNoise.ipynb (see list_uk_arcmin_for_yml)
      (SAT4, 30): 17.76741806032688
      (SAT4, 40): 21.207586012564423
      (SAT1, 90): 2.77243249663342
      (SAT1, 150): 2.798531403709892
      (SAT3, 230): 8.474221515572802
      (SAT3, 290): 21.861113346794266 
    nsims_noise_cov: 2 # number of simulations used to estimate the noise covariance matrix
    include_nhits: True #Sim related parameter
    nsims_plot: 1 # number of simulations that will be used for ploting

parametric_sep_pars:
  # minimization options
  method: 'TNC'
  tol: 1.0e-18
  options:
    disp: False
    gtol: 1.0e-12
    eps: 1.0e-12
    maxiter: 100
    ftol: 1.0e-12

map2cl_pars:
    delta_ell: 10 # can also be a list
    purify_e: True
    purify_b: True
    n_iter_namaster: 3

