# Here is a sample .yaml file that can be used
# to store the metadata necessary to run the
# SO BB pipeline.

# Define the directories
## Let's start with directories of data products
data_dirs:
  root: "/global/homes/j/jost/Megatop/TestMSS2"
  map_directory: ''
  # beam_directory: "beams"
  # bandpasses_directory: "bandpasses"
  # mock_directory: "mock_data"
## Then directories in which we will store outputs
output_dirs:
  root: "/pscratch/sd/j/jost/SO_MEGATOP/MSS2/Coadd"
  mask_directory: "masks"
  pre_process_directory: "pre_processing"
  covmat_directory: "covariances"  


fiducial_cmb: 
  cls_cmb_directory: "/global/homes/j/jost/Megatop/fiducial_cmb_spectra"
  lensed: "Cls_Planck2018_lensed_scalar.fits"
  unlensed_scalar_tensor_r1: "Cls_Planck2018_unlensed_scalar_and_tensor_r1.fits"

##################################
#    Metadata related to maps    #
# ------------------------------ #
#                                #
# The structure of input splits  #
# is the following:              #
#                                #
# tag:                           #
#   file_root: ...               #
#   n_splits: ...                #
#   freq_tag: ...                #
#   exp_tag: ...                 #
##################################
# /global/cfs/cdirs/sobs/sims/mss-0002/RC1.r01/
map_sets:
  SAT4_f030:
    file_root: "sobs_RC1.r01_SAT4_mission_f030_4way_coadd_sky_map_healpix"
    fg_root: "sobs_RC1.r01_SAT4_mission_f030_4way_coadd_foreground_map_healpix"
    cmb_root: "sobs_RC1.r01_SAT4_mission_f030_4way_coadd_cmb_map_healpix"
    freq_tag: 30         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT4" 
    set_tag: MSS2
  SAT4_f040:
    file_root: "sobs_RC1.r01_SAT4_mission_f040_4way_coadd_sky_map_healpix"
    fg_root: "sobs_RC1.r01_SAT4_mission_f040_4way_coadd_foreground_map_healpix"
    cmb_root: "sobs_RC1.r01_SAT4_mission_f040_4way_coadd_cmb_map_healpix"
    freq_tag: 40         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT4" 
    set_tag: MSS2
  SAT1_f090:
    file_root: "sobs_RC1.r01_SAT1_mission_f090_4way_coadd_sky_map_healpix"
    fg_root: "sobs_RC1.r01_SAT1_mission_f090_4way_coadd_foreground_map_healpix"
    cmb_root: "sobs_RC1.r01_SAT1_mission_f090_4way_coadd_cmb_map_healpix"    
    freq_tag: 90         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT1"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    set_tag: MSS2
  SAT1_f150:
    file_root: "sobs_RC1.r01_SAT1_mission_f150_4way_coadd_sky_map_healpix"
    fg_root: "sobs_RC1.r01_SAT1_mission_f150_4way_coadd_foreground_map_healpix"
    cmb_root: "sobs_RC1.r01_SAT1_mission_f150_4way_coadd_cmb_map_healpix"        
    freq_tag: 150
    exp_tag: "SAT1"
    set_tag: MSS2
  SAT3_f230:
    file_root: "sobs_RC1.r01_SAT3_mission_f230_4way_coadd_sky_map_healpix"
    fg_root: "sobs_RC1.r01_SAT3_mission_f230_4way_coadd_foreground_map_healpix"
    cmb_root: "sobs_RC1.r01_SAT3_mission_f230_4way_coadd_cmb_map_healpix"         
    freq_tag: 230         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT3"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    set_tag: MSS2
  SAT3_f290:
    file_root: "sobs_RC1.r01_SAT3_mission_f290_4way_coadd_sky_map_healpix"
    fg_root: "sobs_RC1.r01_SAT3_mission_f290_4way_coadd_foreground_map_healpix"
    cmb_root: "sobs_RC1.r01_SAT3_mission_f290_4way_coadd_cmb_map_healpix"      
    freq_tag: 290
    exp_tag: "SAT3"
    set_tag: MSS2

####################
# Masking metadata #
####################
masks:
  # Load nhits map from disk? Give absolute location here.
  # If left blank, the mask handler will download the nominal nhits map.
  input_nhits_path: "/global/cfs/cdirs/sobs/sims/mss-0002/RC1.r01/sobs_RC1.r01_SAT4_mission_f030_4way_coadd_sky_ivar_healpix.fits"

  # Copies of all masks are stored under these names inside mask_directory
  analysis_mask: "analysis_mask.fits"
  nhits_map: "nhits_map.fits"
  binary_mask: "binary_mask.fits"
  galactic_mask_root: "planck_galactic_mask"
  point_source_mask: "point_source_mask.fits"
  mask_handler_binary_zero_threshold: 1.0e-3 #default 1.0e-3


  include_in_mask: []
  gal_mask_mode: "gal070"
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: "C1"

