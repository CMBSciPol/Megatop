data_dirs:
  beams: beams
  maps: maps
  passbands: passbands
  noise_maps: noise
  root: /Users/landais/Desktop/UV/ProtoMegatop2/Megatop/data

map_sets:

- exp_tag: SO-SAT
  file_prefix: ''   
  freq_tag: 27
  nhits_map_path: SO_nominal 
  #beam: 91.
  beam: 0.
  angles_central_value_degrees : 1.0
  angles_uncertainty_degrees : None
  # angle_incertanty_degrees = 0 Corresponds to no prior case and not ideal infinite precision case, as prior = 0 lead to divergence in the Likelihood.
  
- exp_tag: SO-SAT
  file_prefix: ''
  freq_tag: 39
  nhits_map_path: SO_nominal 
  #beam: 63.
  beam: 0.
  angles_central_value_degrees : 5.0
  angles_uncertainty_degrees : None
  
- exp_tag: SO-SAT
  file_prefix: ''
  freq_tag: 93
  nhits_map_path: SO_nominal 
  #beam: 30.
  beam: 0.
  angles_central_value_degrees : 10.0
  angles_uncertainty_degrees : None
  
- exp_tag: SO-SAT
  file_prefix: ''
  freq_tag: 145
  nhits_map_path: SO_nominal 
  #beam: 17.
  beam: 0.
  angles_central_value_degrees : 20.0
  angles_uncertainty_degrees : None

- exp_tag: SO-SAT
  file_prefix: ''
  freq_tag: 225
  nhits_map_path: SO_nominal 
  #beam: 11.
  beam: 0.
  angles_central_value_degrees : 40.0
  angles_uncertainty_degrees : None
  
- exp_tag: SO-SAT
  file_prefix: ''
  freq_tag: 280
  nhits_map_path: SO_nominal 
  #beam: 9.
  beam: 0.
  angles_central_value_degrees : 60.0
  angles_uncertainty_degrees : None

map_sim_pars:
  A_lens: 1
  cmb_seed: 1
  cmb_sim_no_pysm: true
  filter_sims: false
  n_sim: 1
  r_input: 0.0
  Birefringence: 0.35
  single_cmb: false
  TF_n_sim: 2
  TF_power_law_amp: 1.0
  TF_power_law_delta_ell: 1
  TF_power_law_index: 2.0
  passband_int: false
  sky_model:
  - d0
  - s0

masks_pars:
  analysis_mask_name: common_analysis_mask
  binary_mask_name: common_binary_mask
  galactic_mask_name: galactic_mask
  nhits_map_name: nhits_map
  sources_mask_name: sources_mask
  include_galactic: false
  include_sources: false
  input_sources_mask: null
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: C1
  fwhm_arcmin_smooth_nhits: 60
  binary_mask_zero_threshold: 1e-1
  gal_key: GAL060
  mock_nsources: 100
  mock_sources_hole_radius: 4.0

noise_cov_pars:
  save_preprocessed_noise_maps: true
noise_sim_pars:
  include_nhits: true
  n_sim: 10
  experiments: 
    SO-SAT:
      usev3p1: True
      default_bands: [27, 39, 93, 145, 225, 280]
      Ntubes_years: [1.,9.,5.]
      noise_option: white_noise
      v3_one_over_f_mode: OPTIMISTIC
      v3_sensitivity_mode: GOAL

output_dirs:
  components: components
  covar: covar
  masks: masks
  noise_spectra: noise_spectras
  plots: plots
  preproc: preproc
  spectra: spectra
  mcmc: mcmc
  root: /Users/landais/Desktop/UV/ProtoMegatop2/Megatop/outputs

parametric_sep_pars:
  alm2map: false
  harmonic_delta_ell: 10
  harmonic_lmax: 256
  harmonic_lmin: 30
  include_synchrotron: true
  megabuster_options:
    max_steps_CG: 2500
    tol_CG: 1.0e-8
    use_preconditioner_diag: false
    use_preconditioner_pinv: false
    use_obsmat: false
    use_calibration_matrix: True
    use_hessienne: False
    use_hmc: False
    n_warm: 50
    n_samples: 50
    max_iter: 200
  minimize_method: TNC
  minimize_options:
    disp: false
    eps: 1.0e-12
    ftol: 1.0e-16
    gtol: 1.0e-16
    maxiter: 100
  minimize_tol: 1.0e-25
  passband_int: false
  use_harmonic_compsep: false
  use_megabuster: True
  #n_sample : 10

cl2r_pars:
  dust_marg: false
  lmax_cosmo_analysis: null
  lmin_cosmo_analysis: null
  load_model_spectra: true
  n_steps: 5000
  n_steps_burnin: 2000
  n_walkers: 300
  prior_bounds:
    A_{dust}:
    - 0.0
    - 1.0
    A_{lens}:
    - 0.0
    - 2.0
    A_{sync}:
    - 0.0
    - 1.0
    r:
    - -0.02
    - 1.0
    Birefringence:
    - -1
    - 1
  sync_marg: false

fiducial_cmb:
  camb_cosmo_pars:
    As: 2.0e-09
    H0: 67.5
    extra_args: null
    ns: 0.965
    ombh2: 0.022
    omch2: 0.122
    tau: 0.06
  compute_from_camb: true
  fiducial_lensed_scalar: null
  fiducial_unlensed_scalar_tensor_r1: null
general_pars:
  lmax: 500
  lmin: 30
  nside: 256
map2cl_pars:
  delta_ell: 10
  n_iter_namaster: 3
  purify_b: true
  purify_e: false

plot_pars:
  lmax_plot: 1000
  lmin_plot: 30
pre_proc_pars:
  DEBUGskippreproc: false
  common_beam_correction: 0
  correct_for_TF: false
  sum_TF_column: true
