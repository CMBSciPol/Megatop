# End-to-end sanity check configuration.
# 3 SO frequencies, nside=64, 2 signal + 2 noise sims.
# Outputs land in /tmp/megatop_e2e_check — safe to delete afterwards.

data_dirs:
  root: /tmp/megatop_e2e_check/data
  maps: maps
  noise_maps: noise_maps
  beams: beams
  passbands: passbands
  TF_sims_maps: TF_sims_maps

output_dirs:
  root: /tmp/megatop_e2e_check/outputs
  masks: masks
  binning: binning
  transfer_functions: transfer_functions
  preproc: preproc
  covar: covar
  plots: plots
  components: components
  spectra: spectra
  noise_spectra: noise_spectra
  mcmc: mcmc
  fiducial_cmb: fiducial_cmb

fiducial_cmb:
  compute_from_camb: true
  fiducial_lensed_scalar: null
  fiducial_unlensed_scalar_tensor_r1: null
  camb_cosmo_pars:
    H0: 67.5
    ombh2: 0.022
    omch2: 0.122
    tau: 0.06
    As: 2.0e-09
    ns: 0.965
    extra_args: null

# Three frequencies — enough for CMB + dust + synchrotron separation.
# Beams are realistic SO SAT values (arcmin).
map_sets:
  - freq_tag: 93
    exp_tag: SO
    beam: 30.0
    nhits_map_path: SO_nominal
    file_prefix: ''
    noise_prefix: noise_
    simfoTF_prefix: simforTF_

    passband_filename: ''
    depth_map_path: null
  - freq_tag: 145
    exp_tag: SO
    beam: 17.0
    nhits_map_path: SO_nominal
    file_prefix: ''
    noise_prefix: noise_
    simfoTF_prefix: simforTF_

    passband_filename: ''
    depth_map_path: null
  - freq_tag: 225
    exp_tag: SO
    beam: 11.0
    nhits_map_path: SO_nominal
    file_prefix: ''
    noise_prefix: noise_
    simfoTF_prefix: simforTF_

    passband_filename: ''
    depth_map_path: null

masks_pars:
  nhits_map_name: nhits_map
  binary_mask_name: binary_mask
  analysis_mask_name: analysis_mask
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: C1
  binary_mask_zero_threshold: 0.1
  fwhm_arcmin_smooth_nhits: 60.0
  include_galactic: false
  galactic_mask_name: galactic_mask
  gal_key: null
  include_sources: false
  input_sources_mask: null
  sources_mask_name: sources_mask
  mock_nsources: 100
  mock_sources_hole_radius: 4.0

# nside=64 → pixel ~55 arcmin; lmax=150 (well below the 3*nside-1=191 limit)
general_pars:
  nside: 64
  lmin: 30
  lmax: 100

pre_proc_pars:
  common_beam_correction: 60.0
  DEBUGskippreproc: false
  correct_for_TF: false
  sum_TF_column: true

parametric_sep_pars:
  include_synchrotron: true
  use_harmonic_compsep: false
  harmonic_lmin: 30
  harmonic_lmax: 150
  harmonic_delta_ell: 10
  alm2map: false
  minimize_method: TNC
  minimize_tol: 1.0e-18
  minimize_options:
    disp: false
    gtol: 1.0e-12
    eps: 1.0e-12
    maxiter: 100
    ftol: 1.0e-12
  passband_int: false

map2cl_pars:
  delta_ell: 20
  purify_e: false
  purify_b: true
  n_iter_namaster: 3

plot_pars:
  lmin_plot: 30
  lmax_plot: 150

map_sim_pars:
  n_sim: 2
  sky_model:
    - d0
    - s0
  cmb_sim_no_pysm: true
  r_input: 0.0
  A_lens: 1.0
  cmb_seed: 42
  single_cmb: false
  filter_sims: false
  generate_sims_for_TF: false
  TF_power_law_amp: 1.0
  TF_power_law_index: 2.0
  TF_power_law_delta_ell: 1
  TF_n_sim: 1
  passband_int: false

noise_sim_pars:
  n_sim: 2
  include_nhits: false
  seed: 43
  experiments:
    SO:
      usev3p1: true
      default_bands:
        - 27
        - 39
        - 93
        - 145
        - 225
        - 280
      noise_option: white_noise
      v3_sensitivity_mode: GOAL
      v3_one_over_f_mode: OPTIMISTIC
      Ntubes_years:
        - 1.0
        - 9.0
        - 5.0
      SAC_yrs_LF: 1.0

# Reduced MCMC for speed — enough to confirm the pipeline runs end-to-end.
cl2r_pars:
  dust_marg: false
  sync_marg: false
  load_model_spectra: true
  n_walkers: 32
  n_steps: 200
  n_steps_burnin: 50
  lmin_cosmo_analysis: null
  lmax_cosmo_analysis: null
  prior_bounds:
    r:
      - -0.02
      - 1.0
    A_{lens}:
      - 0.0
      - 2.0
    A_{dust}:
      - 0.0
      - 1.0
    A_{sync}:
      - 0.0
      - 1.0
