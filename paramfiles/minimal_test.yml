# Here is a sample .yaml file that can be used
# to store the metadata necessary to run the
# MEGATOP pipeline.

# Define the directories
## Let's start with directories of data products
data_dirs:
  root: "/pscratch/sd/j/jost/SO_MEGATOP/MinimalTest_d0s0_nside128_correctsave_all5arcmin/data"
  map_directory: "maps"
  beam_directory: "beams"
  bandpasses_directory: "bandpasses"
  mock_directory: "mock_noise"


## Then directories in which we will store outputs
output_dirs:
  root: "/pscratch/sd/j/jost/SO_MEGATOP/MinimalTest_d0s0_nside128_correctsave_all5arcmin/v1RefactorOutputs"
  mask_directory: "masks"
  pre_process_directory: "pre_processing"
  covmat_directory: "covariances"
  plots_directory: "plots"
  components_directory: "components"
  spectra_directory: "spectra"


fiducial_cmb:
  cls_cmb_directory: "/global/homes/j/jost/Megatop/fiducial_cmb_spectra"
  lensed: "Cls_Planck2018_lensed_scalar.fits"
  unlensed_scalar_tensor_r1: "Cls_Planck2018_unlensed_scalar_and_tensor_r1.fits"

##################################
#    Metadata related to maps    #
# ------------------------------ #
#                                #
# The structure of input splits  #
# is the following:              #
#                                #
# tag:                           #
#   file_root: ...               #
#   n_splits: ...                #
#   freq_tag: ...                #
#   exp_tag: ...                 #
##################################
map_sets:
  SAT4_f027:
    file_root: "sat4_f027"
    freq_tag: 27         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT4"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    noise_root: "noise_sat4_f027"
  SAT4_f039:
    file_root: "sat4_f039"
    freq_tag: 39         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT4"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    noise_root: "noise_sat4_f039"
  SAT1_f093:
    file_root: "sat1_f093"
    freq_tag: 93         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT1"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    noise_root: "noise_sat1_f093"
  SAT1_f145:
    file_root: "sat1_f145"
    freq_tag: 145
    exp_tag: "SAT1"
    noise_root: "noise_sat1_f145"
  SAT3_f220:
    file_root: "sat3_f220"
    freq_tag: 220         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT3"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    noise_root: "noise_sat3_f220"
  SAT3_f280:
    file_root: "sat3_f280"
    freq_tag: 280
    exp_tag: "SAT3"
    noise_root: "noise_sat3_f280"


####################
# Masking metadata #
####################
masks:
  # Load nhits map from disk? Give absolute location here.
  # If left blank, the mask handler will download the nominal nhits map.
  input_nhits_path:

  # Copies of all masks are stored under these names inside mask_directory
  analysis_mask: "analysis_mask.fits"
  nhits_map: "nhits_map.fits"
  binary_mask: "binary_mask.fits"
  galactic_mask_root: "planck_galactic_mask"
  point_source_mask: "point_source_mask.fits"
  mask_handler_binary_zero_threshold: 0.1 #default 1.0e-3

  include_in_mask: ['galactic']
  gal_mask_mode: "gal070"
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: "C1"

####################################
# Metadata related to the analysis #
####################################
## General parameters
general_pars:
  # frequencies: [27, 39, 93, 145, 225, 280] # [93, 145, 225, 280] #TODO: redundant
  nside: 128
  lmin: 30 #30
  lmax: 256 #200
  # nlb: 10
  # custom_bins: True
  # include_stat_res: False
  # no_inh: False
  # Nspec: 0


pre_proc_pars:
    common_beam_correction: 10.0 # In arcmin. If 0 the common beam step will be skipped
    # fwhm: [91., 63., 30., 17., 11.,  9.] # In arcmin for each frequency. TODO: replace with path to import from file?
    fwhm: [5., 5., 5., 5., 5., 5.] # In arcmin for each frequency. TODO: replace with path to import from file?
    # fwhm: [30., 30., 30., 17., 11.,  9.] # In arcmin for each frequency. TODO: replace with path to import from file?


noise_cov_pars:
    nrealisation_noise_cov:

parametric_sep_pars:
  # minimization options
  method: 'TNC'
  tol: 1.0e-18
  options:
    disp: False
    gtol: 1.0e-12
    eps: 1.0e-12
    maxiter: 100
    ftol: 1.0e-12
  DEBUG_UseSynchrotron: True

map2cl_pars:
    delta_ell: 10 # can also be a list
    purify_e: True
    purify_b: True
    n_iter_namaster: 3

plot_pars:
  lmin_plot: 30
  lmax_plot: 256

####################################
# Metadata related to the simulation #
####################################

#Simulation of signal and foregrounds
map_sim_pars:
  sky_model: ['d0', 's0']
  cmb_sim_no_pysm: True
  r_input: 0.0
  A_lens:  1.0
  fixed_cmb: False #TODO: needed ??

#sSimulation of the noise
noise_sim_pars:
    experiment: 'SO'
    noise_option: 'white_noise'
    sensitivity_mode: 2
    SAC_yrs_LF: 1
    knee_mode: 1
    include_nhits: False
    save_noise_sim: True
