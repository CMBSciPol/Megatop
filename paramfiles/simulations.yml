data_dirs:
  root: "../data"
  map_directory: "maps"
  beam_directory: "beams"
  bandpasses_directory: "bandpasses"


output_dirs: 
  root: "/pscratch/sd/j/jost/SO_MEGATOP/100SimsNside64to32WithNhitsCorrected/OnTheFlySims"
  cmb_directory: "CMB"
  cmb_beamed_directory: "CMB_beamed"
  fg_directory: "fg"
  noise_directory: "noise"
  comb_directory: "comb"
  comb_spectra_directory: "comb_spectra"
  plots_directory: "plots"
  mask_directory: "masks" #not useful for sims but metadata error


general_pars:
    nsims: 100
    lmax: -1
    nside: 64


fiducial_cmb: 
    cls_cmb_directory: "../fiducial_cmb_spectra"
    lensed: "Cls_Planck2018_lensed_scalar.fits"
    unlensed_scalar_tensor_r1: "Cls_Planck2018_unlensed_scalar_and_tensor_r1.fits"

map_sim_pars:
    nside_sim: 64
    cmb_model: 'c1' #todo: remove, redundant with simulations.yml?
    external_sky_sims: '/global/cfs/cdirs/sobs/users/krach/BBSims/'  #todo: remove, redundant with simulations.yml?
    combined_directory: '/global/cfs/cdirs/sobs/users/krach/BBSims/' #todo: remove, redundant with simulations.yml?
    external_binary_mask: '' #todo: remove, redundant with simulations.yml?
    external_noise_cov: '' #todo: remove, redundant with simulations.yml?
    pixel_based_noise_cov: False #todo: remove, redundant with simulations.yml?
    isim:  0 #todo: remove, redundant with simulations.yml?
    noise_cov_beam_correction: False #todo: remove, redundant with simulations.yml?
    bypass_noise_cov: True #todo: remove, redundant with simulations.yml?
    dust_model: 'd0'
    sync_model: 's0'
    tag: 'SO_sims'
    cmb_sim_no_pysm: True
    r_input: 0.0
    A_lens:  1.0

noise_sim_pars:
    noise_option: 'white_noise'
    sensitivity_mode: 2
    SAC_yrs_LF: 1
    knee_mode: 1
    include_nhits: True


############  sims but metadata error: #########
map_sets:
  SAT1_f093:
    file_root: None
    freq_tag: None         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: None      # Experiment tag (useful to get noise-bias free cross-split spectra)

masks:
  # Load nhits map from disk? Give absolute location here.
  # If left blank, the mask handler will download the nominal nhits map.
  input_nhits_path:
  analysis_mask: "analysis_mask.fits"
  nhits_map: "nhits_map.fits"
  binary_mask: "binary_mask.fits"
  galactic_mask_root: "planck_galactic_mask"
  point_source_mask: "point_source_mask.fits"
  mask_handler_binary_zero_threshold: 1.0e-2 #default 1.0e-3
  
  include_in_mask: []
  gal_mask_mode: "gal070"
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: "C1"

