# Here is a sample .yaml file that can be used
# to store the metadata necessary to run the
# SO BB pipeline.

# Define the directories
## Let's start with directories of data products
data_dirs:
  root: "/global/homes/j/jost/Megatop/data"
  map_directory: "maps"
  beam_directory: "beams"
  bandpasses_directory: "bandpasses"
  mock_directory: "mock_data"
## Then directories in which we will store outputs
output_dirs:
  root: "/pscratch/sd/j/jost/SO_MEGATOP/100SimsNside64to32WithNhitsCorrected/outputs"
  mask_directory: "masks"
  pre_process_directory: "pre_processing"
  covmat_directory: "covariances"  


fiducial_cmb: 
  cls_cmb_directory: "/global/homes/j/jost/Megatop/fiducial_cmb_spectra"
  lensed: "Cls_Planck2018_lensed_scalar.fits"
  unlensed_scalar_tensor_r1: "Cls_Planck2018_unlensed_scalar_and_tensor_r1.fits"

##################################
#    Metadata related to maps    #
# ------------------------------ #
#                                #
# The structure of input splits  #
# is the following:              #
#                                #
# tag:                           #
#   file_root: ...               #
#   n_splits: ...                #
#   freq_tag: ...                #
#   exp_tag: ...                 #
##################################
map_sets:
  SAT1_f093:
    file_root: "cmb_sat1_f093"
    freq_tag: 93         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT1"      # Experiment tag (useful to get noise-bias free cross-split spectra)
  SAT1_f145:
    file_root: "cmb_sat1_f145"
    freq_tag: 145
    exp_tag: "SAT1"
  SAT2_f220:
    file_root: "cmb_sat2_f220"
    freq_tag: 220         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "SAT2"      # Experiment tag (useful to get noise-bias free cross-split spectra)
  SAT2_f280:
    file_root: "cmb_sat2_f280"
    freq_tag: 280
    exp_tag: "SAT2"

####################
# Masking metadata #
####################
masks:
  # Load nhits map from disk? Give absolute location here.
  # If left blank, the mask handler will download the nominal nhits map.
  input_nhits_path:

  # Copies of all masks are stored under these names inside mask_directory
  analysis_mask: "analysis_mask.fits"
  nhits_map: "nhits_map.fits"
  binary_mask: "binary_mask.fits"
  galactic_mask_root: "planck_galactic_mask"
  point_source_mask: "point_source_mask.fits"
  mask_handler_binary_zero_threshold: 1.0e-2 #default 1.0e-3

  include_in_mask: []
  gal_mask_mode: "gal070"
  apod_radius: 10.0
  apod_radius_point_source: 4.0
  apod_type: "C1"

####################################
# Metadata related to the analysis #
####################################
## General parameters
general_pars:
  frequencies: [27, 39, 93, 145, 225, 280] # [93, 145, 225, 280]
  nside: 32 #256
  lmin: 10 #30
  lmax: 95 #200
  # nlb: 10
  # custom_bins: True
  noise_option: 'white_noise'
  include_stat_res: False
  no_inh: False
  Nspec: 0
  sensitivity_mode: 2
  SAC_yrs_LF: 1
  knee_mode: 1
  ny_lf: 1.0
  # bmodes_template: ''
  # instrument: 'SO'
  # bandpass: False
  # Nsims_bias:  500
  # # common_beam_correction: 100.0
  # effective_beam_correction: True
  # Nico_noise_combination: True
  # # Where the beam window is lower than beam_floor, set it to beam_floor
  # beam_floor: 1.e-2



pre_proc_pars:
    common_beam_correction: 100.0 # In arcmin. If 0 the common beam step will be skipped
    fwhm: [91., 63., 30., 17., 11.,  9.] # In arcmin for each frequency. TODO: replace with path to import from file?

noise_cov_pars:
    include_nhits: True
    nsims_plot: 1 # number of simulations that will be used for ploting
    # mask_to_apply: False #"binary_mask.fits"

# ## Simulation related
map_sim_pars:
  cmb_model: 'c1' #todo: remove, redundant with simulations.yml?
  dust_model: 'd0' #todo: remove, redundant with simulations.yml?
  sync_model: 's0' #todo: remove, redundant with simulations.yml?
  tag: 'SO_sims' #todo: remove, redundant with simulations.yml?
  cmb_sim_no_pysm: True  #todo: remove, redundant with simulations.yml?
  external_sky_sims: '/global/cfs/cdirs/sobs/users/krach/BBSims/'  #todo: remove, redundant with simulations.yml?
  combined_directory: '/global/cfs/cdirs/sobs/users/krach/BBSims/' #todo: remove, redundant with simulations.yml?
  external_binary_mask: '' #todo: remove, redundant with simulations.yml?
  external_noise_cov: '' #todo: remove, redundant with simulations.yml?
  pixel_based_noise_cov: False #todo: remove, redundant with simulations.yml?
  isim:  0 #todo: remove, redundant with simulations.yml?
  noise_cov_beam_correction: False #todo: remove, redundant with simulations.yml?
  bypass_noise_cov: True #todo: remove, redundant with simulations.yml?
  r_input: 0.0 #todo: remove, redundant with simulations.yml?
  A_lens:  1.0 #todo: remove, redundant with simulations.yml?